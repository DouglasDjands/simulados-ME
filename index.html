<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Inspeção - Douglas</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 10px; }
        .container { max-width: 800px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn-menu { display: block; width: 100%; padding: 15px; margin: 10px 0; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-menu:hover { background-color: #2980b9; }
        
        /* Botões de Erro e Retomar */
        .btn-acumulado { background-color: #e74c3c !important; border: 2px solid #c0392b; }
        .btn-continuar { background-color: #e67e22 !important; font-weight: bold; border: 2px solid #d35400; }
        .badge { background: white; color: #e74c3c; padding: 2px 10px; border-radius: 20px; margin-left: 10px; font-size: 14px; }
        
        .option { background: #f9f9f9; border: 2px solid #eee; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #eef2f3; border-color: #3498db; }
        .selected { background: #d6eaf8 !important; border-color: #3498db !important; }
        
        .nav-btns { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .control-btns { display: flex; justify-content: center; margin-top: 15px; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        
        button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-prev { background: #95a5a6; color: white; flex: 1; }
        .btn-next { background: #27ae60; color: white; flex: 1; }
        .btn-exit { background: #e74c3c; color: white; }
        .btn-pause { background: #f39c12; color: white; }
        
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; }
        .result-card { border-bottom: 1px solid #ddd; padding: 15px 0; }
    </style>
</head>
<body>

<div id="menu" class="container">
    <h1>Simulado de Inspeção (ME)</h1>
    
    <button id="btnRefazerTudoErrado" class="btn-menu btn-acumulado hidden" onclick="iniciarSimulado('erros_globais')">
        🚩 REFAZER QUESTÕES ACUMULADAS <span id="contadorGlobal" class="badge">0</span>
    </button>

    <button id="btnRetomar" class="btn-menu btn-continuar hidden" onclick="retomarSimulado()">
        ⚡ CONTINUAR ONDE PAREI
    </button>

    <hr style="border:0; border-top: 1px solid #eee; margin: 20px 0;">

    <button class="btn-menu" onclick="iniciarSimulado('total')">1 - Simulado Completo (Todas)</button>
    
    <div style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center;">
        <label>2 - Escolher Prova: </label>
        <select id="escolhaProva" style="padding: 8px; border-radius: 4px;">
            <option value="1">Prova 01</option>
            <option value="2">Prova 02</option>
            <option value="3">Prova 03</option>
            <option value="4">Prova 04</option>
            <option value="5">Prova 05</option>
            <option value="6">Prova 06</option>
            <option value="7">Prova 07</option>
            <option value="8">Prova 08</option>
            <option value="9">Prova 09</option>
            <option value="10">Prova 10</option>
            <option value="11">Prova 11</option>
            <option value="12">Prova 12</option>
         </select>
        <button class="btn-menu" style="width: auto; display: inline-block; margin-left: 10px; padding: 8px 20px;" onclick="iniciarSimulado('especifica')">Iniciar</button>
    </div>
    <button class="btn-menu" onclick="iniciarSimulado('random')">3 - 40 Questões Aleatórias</button>
</div>

<div id="quiz" class="container hidden">
    <div id="progresso" style="font-weight: bold; color: #7f8c8d; margin-bottom: 10px;"></div>
    <div id="pergunta" style="font-size: 18px; margin-bottom: 20px; font-weight: 500;"></div>
    <div id="opcoes"></div>
    
    <div class="nav-btns">
        <button class="btn-prev" id="voltar" onclick="mudarQuestao(-1)">← Voltar</button>
        <button class="btn-next" id="avancar" onclick="mudarQuestao(1)">Próxima →</button>
        <button class="btn-next hidden" id="finalizar" onclick="verResultado()">Finalizar Simulado</button>
    </div>

    <div class="control-btns">
        <button class="btn-exit" onclick="sairSemSalvar()">Sair sem Salvar</button>
        <button class="btn-pause" onclick="salvarEPausar()">Pausar e Salvar</button>
    </div>
</div>

<div id="resultado" class="container hidden">
    <h2 id="placar" style="text-align: center;"></h2>
    <div id="detalhes"></div>
    <button class="btn-menu" onclick="location.reload()">Voltar ao Menu</button>
</div>

<script>
const bancoQuestoes = [ 
    // PROVA 01 
    {p:1, q:"1)- O cabo que conecta o aparelho de ultrassom ao cabeçote é especialmente projetado de forma que um condutor seja perfeitamente centrado dentro de outro condutor. O nome tecnicamente correto deste cabo é:", o:["Cabo BX", "Conduite", "Cabo condutor ultrassônico grau 20", "Cabo coaxial"], r:3},
    {p:1, q:"2)- O processo para comparar um instrumento ou dispositivo com um padrão é denominado:", o:["Angulação", "Atenuação", "Correlação", "Calibração"], r:3},
    {p:1, q:"3)- As ondas de compressão também são denominadas:", o:["Ondas de Lamb", "Ondas de corte", "Ondas transversais", "Ondas longitudinais"], r:3},
    {p:1, q:"4)- As ondas de Rayleigh são também denominadas:", o:["Ondas de corte", "Ondas longitudinais", "Ondas transversais", "Ondas de superfície"], r:3},
    {p:1, q:"5)- O material usado entre a face do cabeçote e a superfície em exame para melhorar a transmissão das ondas ultrassônicas é denominado:", o:["Agente umedecedor", "Transmissor acústico", "lubrificante", "Acoplante"], r:3},
    {p:1, q:"6)- O material piezelétrico existente num cabeçote, que vibra para produzir ondas sônicas é denominado:", o:["Bloco de apoio", "Cunha de lucite", "Acoplante", "Cristal"], r:3},
    {p:1, q:"7)- O método de exame por meio de ultrassom que emprega dois cabeçotes, trabalhando em superfícies opostas da peça em exame, é denominado:", o:["Exame por contato", "Exame por meio de ultrassom com ondas de Lamb", "Método de exame por transparência", "Nenhuma das respostas acima está certa"], r:2},
    {p:1, q:"8)- O número de ondas completas que passam num determinado ponto na unidade de tempo é denominado:", o:["Amplitude do movimento ondulatório", "Duração de um pulso", "Comprimento de onda", "Frequência do movimento ondulatório"], r:3},
    {p:1, q:"9)- O método de exame no qual a peça não está em contato com o cabeçote, sendo separada deste por uma camada de líquido de acoplante é denominado:", o:["Exame por contato", "Exame com ondas superficiais", "Método de inspeção por transparência", "Exame por imersão"], r:3},
    {p:1, q:"10)- O limite entre dois materiais diferentes que estão em contato entre si é denominado:", o:["Rarefator", "Refrator", "Marcador", "Interface"], r:3},
    {p:1, q:"11)- Quando o movimento das partículas de um meio possui sentido paralelo ao sentido de propagação ondas, estas ondas são denominadas:", o:["Transversais", "Superficiais", "De lamb", "Longitudinais"], r:3},
    {p:1, q:"12)- Outra maneira de dizer 25 milhões de ciclos é:", o:["25 quilociclos", "2.500 quilociclos", "25 microciclos", "25 megaciclos"], r:3},
    {p:1, q:"13)- O termo usado em ultrassom para expressar a velocidade com que as ondas de sons passam através de várias substâncias é:", o:["Frequência", "Comprimento de onda", "Velocidade", "Nenhuma das respostas acima está certa"], r:2},
    {p:1, q:"14)- A técnica na qual o feixe de vibrações emitido pelo cristal faz um ângulo com a superfície da peça em exame é denominada:", o:["Técnica de imersão", "Exame por contato", "Exame por transferência", "Exame por meio de ultrassom utilizando cabeçote angular"], r:3},
    {p:1, q:"15)- O ângulo marcado num cabeçote angular corresponde:", o:["Que a direção de propagação do feixe de ondas ultrassônicas emitindo pelo cabeçote faz com a normal oblíqua a superfície da peça por onde é feito o exame", "Do eixo do cabeçote com a normal a superfície", "Do eixo do cabeçote com plano da superfície", "Que a direção da propagação do feixe de ondas ultrassônicas emitindo pelo cabeçote faz com a normal à superfície por onde é feito o exame de uma peça de aço"], r:3},
    {p:1, q:"16)- O ponto de emissão de um certo cabeçote angular:", o:["Depende do material da peça em exame", "Não se altera com o uso do cabeçote", "Pode ser modificado para reduzir a atenuação das ondas ultrassônicas", "Varia de acordo com o desgaste da sapata"], r:3},

    {p:1, q:"18)- Indique a frequência que proporciona a melhor penetração numa peça de aço, com granulação grosseira, com espessura de 30 mm:", o:["2,25 megahertz", "5,0 megahertz", "10 mc", "1,0 megahertz"], r:3},
    {p:1, q:"19)- Um aparelho para exame por meio de ultrasson, utilizando cabeçote normal, é usado para examinar uma peça que consiste em uma chapa plana. este exame detectará:", o:["Defeitos transversais, planos, perperndiculares à superfície da chapa", "Defeitos longitudinais, planos,perpendiculares à superfície da chapa", "Defeitos laminares, planos, paralelos à superfície", "Nenhum dos defeitos citados"], r:2},
    {p:1, q:"20)- No exame por meio de ultrassom, o uso de acoplante entre o cabeçote e a superfície da peça em exame se faz necessário porque:", o:["Serve como lubrificante para minimizar o desgaste do cabeçote", "O cristal do cabeçote não vibrará se este for colocado diretamente sobre a peça", "O acoplante é necessário para fechar o circuito elétrico do cabeçote", "Caso não seja usado, o ar existente na interface entre o cabeçote e a superfície da peça, refletirá quase todo feixe sônico, permitindo que apenas uma pequena quantidade de energia ultrassônica gerada no cabeçote seja tramsmitida para a peça impedindo praticamente a realização do exame"], r:3},
    {p:1, q:"21)- Conciderando que as demais variáveis permanecem inalteradas, qual dos seguintes tipos de ondas se propaga com maior velocidade:", o:["Ondas de corte", "Ondas transversais", "Ondas superficiais", "Ondas Longitudinais"], r:3},
    {p:1, q:"22)- As ondas de som com frequência superior à máxima que pode captada pelo ouvido humano são chamadas de ondas ultrassônicas este tempo se aplica a todas as ondas com frequência superior à:", o:["2 megaciclos por segundo", "2 hilociclos por segundo", "200 kilociclos por segundo", "20.000 ciclos por segundo"], r:3},
    {p:1, q:"23)- Fundamentalmente, a velocidade das ondas de som depende:", o:["Da duração do pulso", "Da Frequência", "Do material através do qual o som se transmite e do tipo de ondas", "Nenhum dos fatores acima citados"], r:2},

    {p:1, q:"25)- A vantagem que os materiais cerâmicos apresentam quando usados em cabeçote é que:", o:["Apresentam muita eficiência de energia ultrassônica", "Possuem impedância mecânica muito baixa", "Podem trabalhar em temperaturas de até 700 graus Celsius", "Apresentam muita eficiência em geração de até 700 graus Celsius"], r:3},

    {p:1, q:"27)- Indique a Frequência do cabeçote que possui o cristal de quartzo de menor espessura:", o:["1 megaciclo", "5 megaciclos", "15 megaciclos", "25 megaciclos"], r:3},
    {p:1, q:"28)- Um cabeçote de 25 megaciclos é adequado:", o:["Para uso em exames por contato com ondas longitudinais", "Para uso em exames por contato com ondas transversais", "Para uso em exames por contato com ondas superficiais", "Quando se usa a técnica de imersão"], r:3},
    {p:1, q:"29)- Quando um feixe de ondas ultrassônicas incide na interface que separa dois materiais desiguais num ângulo diferente de 90 graus e passa por ela, sua propagação no segundo material sera feita em direção diferente, em outro ângulo em relação a normal com interface devido a:", o:["Atenuação", "Rarefação", "Compressão", "Refração"], r:3},
    {p:1, q:"30)- A execução de exames pelo método do contato direto usando cabeçotes normais não são praticadas em alguns casos:", o:["Porque geralmente é limitado as baixas frequências", "Porque é impossível fazer angulação", "Porque a angulação é impossível e porque é geralmente limitada a baixas frequências", "Nenhuma das respostas acima é correta"], r:1},
    {p:1, q:"31)- Nas mesmas circunstâcias qual das Frequências relacionadas abaixo proporcionaria melhor resolução:", o:["1 megaciclo", "5 megaciclos", "10 megaciclos", "25 megaciclos"], r:3},
    {p:1, q:"32)- Qual das seguintes peças produz maior atenuação do som numa certa distância:", o:["Uma peça forjada", "Uma peça extrudada", "A estimação é igual em todas as peças citadas", "Uma peça fundida de granulação grosseira"], r:3},
    {p:1, q:"33)- O princípio da ressonância ultrassônica é geralmente usada para:", o:["Detectar grandes descontinuidades", "Detectar porosidade", "Nenhuma das respostas citadas esta correta", "Medir espessura de parede"], r:3},
    {p:1, q:"34)- O material piezelétrico do cabeçote:", o:["Converte energia elétrica em energia mecânica", "Converte energia mecânica em energia elétrica", "Converte energia elétrica em energia mecânica e vice-versa", "Nenhuma das respostas anteriores"], r:2},
    {p:1, q:"35)- Comprimento de onda mais curto:", o:["1 megaciclo", "10 megaciclos", "5 megaciclos", "25 megaciclos"], r:3},
    {p:1, q:"36)- O ângulo de incidência é ................. ângulo de reflexão:", o:["Maior do que o", "Menor do que o", "Igual ao", "Nenhuma das respostas acima esta correta"], r:2},
    {p:1, q:"37)- Uma Frequência de 100.000 ciclos por segundo também pode ser designada por:", o:["10 quilociclos", "100 megaciclos", "0,1 quilociclos", "100 quilociclos"], r:3},

    {p:1, q:"39)- O termo geral aplicado a trincas, inclusão, porosidade etc. que possam causar a refexão do feixe de ondas ultrassônicas é:", o:["Dispersador", "Atenuador", "Refrator", "Descontinuidade"], r:3},

    // PROVA 02

    {p:2, q:"02)- Indique a frequência do cabeçote que possui o cristal de quartzo de maior espessura:", o:["1,0 megaciclos.", "5,0 megaciclos.", "10,0 megaciclos.", "2,25 megaciclos"], r:0},

let questoesAtuais = [];
let indexAtual = 0;
let respostasUsuario = [];

window.onload = function() {
    atualizarBotaoErros();
    if (localStorage.getItem('progressoDouglas')) {
        document.getElementById('btnRetomar').classList.remove('hidden');
    }
};

function atualizarBotaoErros() {
    const listaErros = JSON.parse(localStorage.getItem('bancoErrosAcumulados') || "[]");
    const btn = document.getElementById('btnRefazerTudoErrado');
    const contador = document.getElementById('contadorGlobal');
    
    if (listaErros.length > 0) {
        btn.classList.remove('hidden');
        contador.innerText = listaErros.length;
    } else {
        btn.classList.add('hidden');
    }
}

function iniciarSimulado(tipo) {
    const escolha = document.getElementById('escolhaProva').value;

    if (tipo === 'total') questoesAtuais = [...bancoQuestoes];
    else if (tipo === 'especifica') questoesAtuais = bancoQuestoes.filter(q => q.p == escolha);
    else if (tipo === 'random') questoesAtuais = [...bancoQuestoes].sort(() => 0.5 - Math.random()).slice(0, 40);
    else if (tipo === 'erros_globais') questoesAtuais = JSON.parse(localStorage.getItem('bancoErrosAcumulados') || "[]");

    if (questoesAtuais.length === 0) return alert("Nenhuma questão encontrada!");

    indexAtual = 0;
    respostasUsuario = new Array(questoesAtuais.length).fill(null);
    exibirQuiz();
}

function exibirQuiz() {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = questoesAtuais[indexAtual];
    document.getElementById('progresso').innerText = `Questão ${indexAtual + 1} de ${questoesAtuais.length}`;
    document.getElementById('pergunta').innerText = q.q;
    
    let html = "";
    q.o.forEach((opt, i) => {
        const sel = respostasUsuario[indexAtual] === i ? 'selected' : '';
        html += `<div class="option ${sel}" onclick="selecionar(${i})">${opt}</div>`;
    });
    document.getElementById('opcoes').innerHTML = html;

    document.getElementById('voltar').style.visibility = indexAtual === 0 ? 'hidden' : 'visible';
    document.getElementById('avancar').classList.toggle('hidden', indexAtual === questoesAtuais.length - 1);
    document.getElementById('finalizar').classList.toggle('hidden', indexAtual !== questoesAtuais.length - 1);
}

function selecionar(i) {
    respostasUsuario[indexAtual] = i;
    mostrarQuestao();
}

function mudarQuestao(p) {
    indexAtual += p;
    mostrarQuestao();
}

function salvarEPausar() {
    const dados = { questoes: questoesAtuais, index: indexAtual, respostas: respostasUsuario };
    localStorage.setItem('progressoDouglas', JSON.stringify(dados));
    alert("Progresso salvo com sucesso!");
    location.reload();
}

function sairSemSalvar() {
    if(confirm("Tem certeza? O progresso desta sessão será perdido.")) {
        location.reload();
    }
}

function retomarSimulado() {
    const salvo = JSON.parse(localStorage.getItem('progressoDouglas'));
    if (salvo) {
        questoesAtuais = salvo.questoes;
        indexAtual = salvo.index;
        respostasUsuario = salvo.respostas;
        exibirQuiz();
    }
}

function verResultado() {
    localStorage.removeItem('progressoDouglas');
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('resultado').classList.remove('hidden');
    
    let acertos = 0;
    let html = "";
    let listaErros = JSON.parse(localStorage.getItem('bancoErrosAcumulados') || "[]");

    questoesAtuais.forEach((q, i) => {
        const acertou = respostasUsuario[i] === q.r;
        if(acertou) {
            acertos++;
            listaErros = listaErros.filter(item => item.q !== q.q);
        } else {
            if (!listaErros.find(item => item.q === q.q)) {
                listaErros.push(q);
            }
        }

        html += `<div class="result-card">
            <p><strong>${i+1}. ${q.q}</strong></p>
            <p>Resposta: <span class="${acertou?'correct':'wrong'}">${respostasUsuario[i]!==null?q.o[respostasUsuario[i]]:'Vazio'}</span></p>
            ${!acertou?`<p>Correta: <span class="correct">${q.o[q.r]}</span></p>`:''}
        </div>`;
    });

    localStorage.setItem('bancoErrosAcumulados', JSON.stringify(listaErros));
    document.getElementById('placar').innerText = `Total: ${acertos} de ${questoesAtuais.length}`;
    document.getElementById('detalhes').innerHTML = html;
}
</script>
