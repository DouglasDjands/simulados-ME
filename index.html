<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Inspeção - Douglas</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 10px; }
        .container { max-width: 800px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn-menu { display: block; width: 100%; padding: 15px; margin: 10px 0; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-menu:hover { background-color: #2980b9; }
        .option { background: #f9f9f9; border: 2px solid #eee; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #eef2f3; border-color: #3498db; }
        .selected { background: #d6eaf8 !important; border-color: #3498db !important; }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 25px; }
        button { padding: 10px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-next { background: #27ae60; color: white; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; text-decoration: line-through; }
        .result-card { border-bottom: 1px solid #ddd; padding: 15px 0; }
    </style>
</head>
<body>

<div id="menu" class="container">
    <h1>Simulado de Inspeção (ME)</h1>
    <button class="btn-menu" onclick="iniciarSimulado('total')">1 - Simulado Completo (Todas)</button>
    <div style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center;">
        <label>2 - Escolher Prova: </label>
        <select id="escolhaProva" style="padding: 8px; border-radius: 4px;">
            <option value="1">Prova 01</option>
            <option value="2">Prova 02</option>
        </select>
        <button class="btn-menu" style="width: auto; display: inline-block; margin-left: 10px; padding: 8px 20px;" onclick="iniciarSimulado('especifica')">Iniciar</button>
    </div>
    <button class="btn-menu" onclick="iniciarSimulado('random')">3 - 40 Questões Aleatórias</button>
</div>

<div id="quiz" class="container hidden">
    <div id="progresso" style="font-weight: bold; color: #7f8c8d; margin-bottom: 10px;"></div>
    <div id="pergunta" style="font-size: 18px; margin-bottom: 20px; font-weight: 500;"></div>
    <div id="opcoes"></div>
    <div class="nav-btns">
        <button class="btn-prev" id="voltar" onclick="mudarQuestao(-1)">Voltar</button>
        <button class="btn-next" id="avancar" onclick="mudarQuestao(1)">Avançar</button>
        <button class="btn-next hidden" id="finalizar" onclick="verResultado()">Finalizar Simulado</button>
    </div>
</div>

<div id="resultado" class="container hidden">
    <h2 id="placar" style="text-align: center;"></h2>
    <div id="detalhes"></div>
    <button class="btn-menu" onclick="location.reload()">Reiniciar</button>
</div>

<script>
const bancoQuestoes = [
    // PROVA 01
    {p:1, q:"O nome tecnicamente correto do cabo que conecta o aparelho ao cabeçote é:", o:["Cabo BX", "Conduite", "Cabo condutor grau 20", "Cabo coaxial"], r:3},
    {p:1, q:"O processo para comparar um instrumento com um padrão é:", o:["Angulação", "Atenuação", "Correlação", "Calibração"], r:3},
    {p:1, q:"As ondas de compressão também são denominadas:", o:["Ondas de Lamb", "Ondas de corte", "Ondas transversais", "Ondas longitudinais"], r:3},
    {p:1, q:"As ondas de Rayleigh são também denominadas:", o:["Ondas de corte", "Ondas longitudinais", "Ondas transversais", "Ondas de superfície"], r:3},
    {p:1, q:"Material usado para melhorar a transmissão das ondas ultrassônicas:", o:["Agente umedecedor", "Transmissor acústico", "Lubrificante", "Acoplante"], r:3},
    {p:1, q:"O material piezelétrico que vibra para produzir ondas sônicas é o:", o:["Bloco de apoio", "Cunha de lucite", "Acoplante", "Cristal"], r:3},
    {p:1, q:"O método que emprega dois cabeçotes em superfícies opostas é:", o:["Exame por contato", "Ondas de Lamb", "Exame por transparência", "Nenhuma anterior"], r:2},
    {p:1, q:"O número de ondas completas na unidade de tempo é:", o:["Amplitude", "Duração do pulso", "Comprimento de onda", "Frequência"], r:3},
    {p:1, q:"Método onde a peça não toca o cabeçote (separada por líquido):", o:["Exame por contato", "Ondas superficiais", "Transparência", "Exame por imersão"], r:3},
    {p:1, q:"O limite entre dois materiais diferentes em contato é denominado:", o:["Rarefator", "Refrator", "Marcador", "Interface"], r:3},

    // PROVA 02
    {p:2, q:"Qual frequência perde mais energia em peça de granulação grosseira?", o:["1,0 MHz", "10,0 MHz", "5,0 MHz", "2,25 MHz"], r:1},
    {p:2, q:"Qual cristal de quartzo possui maior espessura?", o:["1,0 MHz", "5,0 MHz", "10,0 MHz", "2,25 MHz"], r:0},
    {p:2, q:"Cabeçotes com cristal apoiado em cunha plástica são usados para:", o:["Feixe normal", "Técnica de imersão", "Feixe em ângulo", "Nenhuma anterior"], r:2},
    {p:2, q:"Ângulo de propagação no segundo meio após atravessar a interface:", o:["Ângulo de incidência", "Ângulo de rarefação", "Ângulo de reflexão", "Ângulo de refração"], r:3},
    {p:2, q:"O espalhamento do feixe por reflexão em superfície irregular é:", o:["Angulação", "Refração", "Rarefação", "Dispersão"], r:3},
    {p:2, q:"O ângulo de reflexão é:", o:["Igual ao de incidência", "Depende da frequência", "Igual ao de refração", "Depende do acoplante"], r:0},
    {p:2, q:"Fluxo de curta duração e intenso de energia elétrica alternada:", o:["Onda contínua", "Pico de voltagem CC", "Onda ultrassônica", "Pulso"], r:3},
    {p:2, q:"Ondas longitudinais atravessam:", o:["Apenas sólidos", "Apenas líquidos", "Apenas gases", "Sólidos, líquidos e gases"], r:3}
];

let questoesAtuais = [];
let respostasUsuario = {};
let indexAtual = 0;

function iniciarSimulado(modo) {
    const pSel = document.getElementById('escolhaProva').value;
    if(modo === 'total') questoesAtuais = bancoQuestoes;
    else if(modo === 'especifica') questoesAtuais = bancoQuestoes.filter(q => q.p == pSel);
    else questoesAtuais = [...bancoQuestoes].sort(() => 0.5 - Math.random()).slice(0, 40);

    document.getElementById('menu').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    indexAtual = 0;
    respostasUsuario = {};
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = questoesAtuais[indexAtual];
    document.getElementById('progresso').innerText = `Questão ${indexAtual + 1} de ${questoesAtuais.length} (Prova 0${q.p})`;
    document.getElementById('pergunta').innerText = q.q;
    
    let html = "";
    q.o.forEach((opt, i) => {
        html += `<div class="option ${respostasUsuario[indexAtual] === i ? 'selected' : ''}" onclick="selecionar(${i})">${opt}</div>`;
    });
    document.getElementById('opcoes').innerHTML = html;

    document.getElementById('voltar').disabled = indexAtual === 0;
    if (indexAtual === questoesAtuais.length - 1) {
        document.getElementById('avancar').classList.add('hidden');
        document.getElementById('finalizar').classList.remove('hidden');
    } else {
        document.getElementById('avancar').classList.remove('hidden');
        document.getElementById('finalizar').classList.add('hidden');
    }
}

function selecionar(i) {
    respostasUsuario[indexAtual] = i;
    mostrarQuestao();
}

function mudarQuestao(passo) {
    indexAtual += passo;
    mostrarQuestao();
}

function verResultado() {
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('resultado').classList.remove('hidden');
    
    let acertos = 0;
    let html = "";
    questoesAtuais.forEach((q, i) => {
        const correta = q.r;
        const user = respostasUsuario[i];
        const acertou = user === correta;
        if(acertou) acertos++;

        html += `<div class="result-card">
            <p><strong>${i+1}. ${q.q}</strong></p>
            <p>Sua resposta: <span class="${acertou ? 'correct' : 'wrong'}">${q.o[user] || 'Não respondida'}</span></p>
            ${!acertou ? `<p>Resposta correta: <span class="correct">${q.o[correta]}</span></p>` : ''}
        </div>`;
    });

    const nota = (acertos / questoesAtuais.length) * 10;
    const aprovado = nota >= 7;
    document.getElementById('placar').innerHTML = `Nota: ${nota.toFixed(1)} / 10.0<br><span style="color: ${aprovado ? '#27ae60' : '#e74c3c'}">${aprovado ? 'APROVADO' : 'REPROVADO'}</span>`;
    document.getElementById('detalhes').innerHTML = html;
}
</script>
</body>
</html>
